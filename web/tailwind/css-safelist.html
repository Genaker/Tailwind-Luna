<!DOCTYPE html>
<!--
  GLOBAL Tailwind JIT safelist — not deployed to customers; only scanned at build time.

  WHY: tailwind.config.js strips all <?php ?> from .phtml before scanning. Utilities that
  appear only in PHP strings, JSON options, or legacy layout experiments
  must be listed here so `npm run build:tailwind` emits them into web/css/tailwind.css.

  HOW TO USE:
  1. Add one or more <div aria-hidden="true" class="hidden …"> (or similar) in the right section.
  2. Paste the full utility string(s). Use `hidden` so if this file were ever served, nothing shows.
  3. Run: npm run build:tailwind
  4. Keep section comments updated when you add new blocks.

  Related: docs/TAILWIND_CSS_SAFELIST.md
-->
<html lang="en">
  <body>
    <!-- ========== Shell / layout (classes also used from XML or static phtml) ========== -->
    <div class="page-wrapper min-h-screen flex flex-col"></div>
    <div class="page-main flex-1 border border-neutral-200 px-5"></div>
    <div class="columns mx-auto w-full max-w-layout"></div>
    <div class="column main w-full"></div>
    <div class="page-header sticky top-0 z-40 border-b border-neutral-200 bg-white/95 shadow-sm backdrop-blur-sm"></div>
    <div class="page-footer mt-auto border-t border-neutral-200 bg-neutral-50 text-sm text-neutral-600"></div>
    <div class="columns mx-auto flex w-full max-w-layout flex-wrap gap-3 px-4 py-6 sm:px-6 lg:flex-nowrap lg:gap-10 lg:px-8"></div>
    <div class="sidebar sidebar-main order-1 w-full shrink-0 lg:w-64"></div>
    <div class="sidebar sidebar-additional order-3 w-full shrink-0 lg:order-3 lg:w-64"></div>
    <div class="column main order-2 w-full min-w-0 flex-1 px-0 py-0"></div>
    <div class="panel wrapper border-b border-neutral-200 bg-neutral-100 text-sm text-neutral-700"></div>
    <div class="panel header relative mx-auto flex max-w-layout flex-wrap items-center justify-between gap-x-6 gap-y-2 px-4 py-2 sm:px-6 lg:px-8"></div>
    <div class="header content mx-auto flex max-w-layout flex-wrap items-center gap-3 px-4 py-3 sm:gap-4 sm:px-6 lg:px-8"></div>
    <div class="footer content mx-auto max-w-layout space-y-10 px-4 py-10 sm:px-6 lg:px-8"></div>
    <div class="page messages mx-auto max-w-layout px-4 sm:px-6 lg:px-8"></div>
    <!-- Magento_Catalog/layout/catalog_product_view.xml — hero + media/main columns (Tailwind on layout only) -->
    <div
      aria-hidden="true"
      class="hidden grid w-full min-w-0 grid-cols-1 gap-6 lg:grid-cols-2 lg:items-start lg:flex lg:flex-col lg:items-center"
    ></div>

    <!-- ========== Topmenu::getHtml() — mirror Magento_Theme/templates/html/topmenu.phtml variables ========== -->
    <div aria-hidden="true" class="hidden level-top relative flex w-full max-w-full items-center justify-between gap-2 border-0 bg-transparent px-4 py-3.5 text-left text-sm font-semibold tracking-tight text-neutral-900 no-underline outline-none transition-colors duration-150 hover:bg-neutral-100 hover:text-primary active:bg-neutral-200/50 lg:inline-flex lg:h-auto lg:w-auto lg:flex-row lg:justify-center lg:rounded-lg lg:px-3.5 lg:py-2.5 lg:text-sm lg:font-medium lg:text-neutral-800 lg:hover:text-primary"></div>
    <div aria-hidden="true" class="hidden submenu m-0 w-full max-w-full list-none border-0 border-l-2 border-primary/40 bg-neutral-50/95 py-2 pl-3 max-lg:ml-2 max-lg:rounded-r-xl [&_li]:w-full [&_li]:max-w-full [&_a]:block [&_a]:w-full [&_a]:max-w-full [&_a]:break-words [&_a]:px-3 [&_a]:py-2.5 [&_a]:text-left [&_a]:text-sm [&_a]:font-medium [&_a]:text-neutral-700 [&_a]:no-underline [&_a]:transition-colors [&_a]:hover:bg-white/90 [&_a]:hover:text-primary [&_li.all-category>a]:bg-primary/10 [&_li.all-category>a]:font-semibold [&_li.all-category>a]:text-primary-dark lg:absolute lg:left-full lg:top-0 lg:z-50 lg:ml-1 lg:min-w-[14rem] lg:rounded-xl lg:border lg:border-neutral-200 lg:bg-white lg:p-1.5 lg:shadow-lg lg:[&_a]:rounded-lg"></div>

    <!-- ========== Magento_Catalog product/view/gallery.phtml — $c[] only in PHP strings (scanner strips <?php blocks) ========== -->
    <div aria-hidden="true" class="hidden relative w-full max-w-xl mx-auto px-2 sm:px-4"></div>
    <div aria-hidden="true" class="hidden flex flex-col items-center"></div>
    <div aria-hidden="true" class="hidden relative w-full max-h-[min(85vh,40rem)] overflow-hidden rounded-xl bg-neutral-100 ring-1 ring-neutral-200/80"></div>
    <div aria-hidden="true" class="hidden block h-auto max-h-[min(85vh,40rem)] w-full cursor-zoom-in object-contain object-center"></div>
    <div aria-hidden="true" class="hidden mt-3 flex flex-wrap items-center justify-center gap-2 sm:mt-4"></div>
    <div aria-hidden="true" class="hidden gphp-thumb h-16 w-16 shrink-0 cursor-pointer overflow-hidden rounded-lg border border-neutral-200 bg-white object-cover p-0 ring-2 ring-transparent transition hover:ring-primary/60 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary sm:h-[4.5rem] sm:w-[4.5rem] [.is-active]:border-primary [.is-active]:ring-primary"></div>
    <div aria-hidden="true" class="hidden gphp-popup fixed inset-0 z-[9999] hidden items-center justify-center bg-black/85 p-4"></div>
    <div aria-hidden="true" class="hidden relative flex max-h-full max-w-full flex-col items-center"></div>
    <div aria-hidden="true" class="hidden max-h-[90vh] max-w-full rounded-lg object-contain shadow-2xl"></div>
    <div aria-hidden="true" class="hidden absolute -right-1 -top-10 z-50 rounded-md bg-white/10 px-3 py-1.5 text-sm font-medium text-white hover:bg-white/20 focus:outline focus:outline-2 focus:outline-offset-2 focus:outline-white sm:right-0 sm:top-0"></div>

    <!-- ========== Custom: add utilities that only exist in PHP / JSON / JS below ========== -->
    <!-- Magento_Catalog/templates/product/list.phtml — grid mode classes built in PHP -->
    <div
      aria-hidden="true"
      class="hidden grow w-full block mx-auto mb-3 flex flex-col mt-2 mb-1 font-semibold text-lg text-center pt-1 py-1 w-full justify-center"
    ></div>
  </body>
</html>
